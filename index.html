  <style>
    :root {
      --teal: #00d4c8;
      --teal-dim: #00a89e;

      --card: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    .badge { font-size: 5rem; font-weight: 900; color: rgba(255,255,255,0.06); position: absolute; top: -10px; right: 12px; line-height: 1; pointer-events: none; user-select: none; }

    .pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,212,200,0.12); color: var(--teal); border: 1px solid rgba(0,212,200,0.25); border-radius: 999px; padding: 3px 10px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .pill.sales { background: rgba(251,146,60,0.12); color: #fb923c; border-color: rgba(251,146,60,0.25); }

    .pbar-track { background: #2a2a2a; border-radius: 999px; height: 5px; overflow: hidden; }
    .pbar-fill { height: 100%; background: linear-gradient(90deg, var(--teal-dim), var(--teal)); border-radius: 999px; transition: width 0.4s ease; }
    .pbar-fill.orange { background: linear-gradient(90deg, #ea580c, #fb923c); }

    .module-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; position: relative; }
    .module-card:hover { border-color: #3a3a3a; }
    .module-card.complete { border-color: rgba(0,212,200,0.3); }

    .lesson-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #1f1f1f; cursor: pointer; transition: background 0.15s; }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-row:hover { background: #1a1a1a; }

    .check-box { width: 18px; height: 18px; border: 2px solid #3a3a3a; border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .check-box.checked { background: var(--teal); border-color: var(--teal); }
    .check-box svg { display: none; }
    .check-box.checked svg { display: block; }

    .notes-area { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; color: #ccc; font-size: 0.78rem; padding: 8px 10px; resize: vertical; min-height: 56px; outline: none; font-family: inherit; margin-top: 6px; transition: border-color 0.2s; }
    .notes-area:focus { border-color: var(--teal-dim); }
    .notes-area::placeholder { color: #444; }

    .res-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--teal); text-decoration: none; background: rgba(0,212,200,0.08); border: 1px solid rgba(0,212,200,0.18); border-radius: 5px; padding: 2px 7px; transition: background 0.15s; }
    .res-link:hover { background: rgba(0,212,200,0.16); }

    .expand-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; transition: color 0.2s, transform 0.2s; }
    .expand-btn.open { color: var(--teal); transform: rotate(180deg); }

    .lesson-body { display: none; }
    .lesson-body.open { display: block; }

    .lesson-title.done { text-decoration: line-through; color: #555; }

    .overall-bar .pbar-track { height: 8px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .reset-btn { background: none; border: 1px solid #333; color: #555; border-radius: 6px; padding: 4px 12px; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; }
    .reset-btn:hover { border-color: #dc2626; color: #dc2626; }

// ─── State ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'aia-curriculum-v1';
function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
let state = loadState();

function getLessonState(id) { return state[id] || { complete: false, notes: '' }; }

// ─── Progress ─────────────────────────────────────────────────────────────────
function totalLessons() { return CURRICULUM.reduce((a, m) => a + m.lessons.length, 0); }
function completedLessons() { return CURRICULUM.reduce((a, m) => a + m.lessons.filter(l => getLessonState(l.id).complete).length, 0); }
function moduleCompleted(mod) { return mod.lessons.filter(l => getLessonState(l.id).complete).length; }

function updateOverallProgress() {
  const pct = Math.round((completedLessons() / totalLessons()) * 100);
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
}

function updateModuleProgress(modId) {
  const mod = CURRICULUM.find(m => m.id === modId);
  const pct = Math.round((moduleCompleted(mod) / mod.lessons.length) * 100);
  const bar = document.getElementById('mod-bar-' + modId);
  const label = document.getElementById('mod-pct-' + modId);
  const card = document.getElementById('mod-card-' + modId);
  if (bar) bar.style.width = pct + '%';
  if (label) label.textContent = pct + '%';
  if (card) card.classList.toggle('complete', pct === 100);
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function toggleLesson(lessonId, modId) {
  const ls = getLessonState(lessonId);
  ls.complete = !ls.complete;
  state[lessonId] = ls;
  saveState(state);
  const box = document.getElementById('check-' + lessonId);
  const title = document.getElementById('title-' + lessonId);
  if (box) box.classList.toggle('checked', ls.complete);
  if (title) { title.classList.toggle('done', ls.complete); title.style.color = ls.complete ? '#555' : '#ddd'; }
  updateModuleProgress(modId);
  updateOverallProgress();
}

function saveNotes(lessonId, value) {
  const ls = getLessonState(lessonId);
  ls.notes = value;
  state[lessonId] = ls;
  saveState(state);
}

function toggleLessonBody(lessonId) {
  const body = document.getElementById('body-' + lessonId);
  const btn = document.getElementById('expand-' + lessonId);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}

function toggleModule(modId) {
  const lessons = document.getElementById('lessons-' + modId);
  const arrow = document.getElementById('mod-arrow-' + modId);
  if (!lessons) return;
  const wasOpen = lessons.style.display !== 'none';
  lessons.style.display = wasOpen ? 'none' : 'block';
  if (arrow) arrow.classList.toggle('open', !wasOpen);
}

function confirmReset() {
  if (confirm('Reset all progress and notes? This cannot be undone.')) {
    state = {};
    saveState(state);
    renderAll();
  }
}

// ─── SVG helpers (no innerHTML for user data) ─────────────────────────────────
function svgCheck() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '10'); svg.setAttribute('height', '10');
  svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', '#0d0d0d'); svg.setAttribute('stroke-width', '3.5');
  svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  poly.setAttribute('points', '20,6 9,17 4,12');
  svg.appendChild(poly);
  return svg;
}

function svgChevron(size) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '2.5');
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  poly.setAttribute('points', '6,9 12,15 18,9');
  svg.appendChild(poly);
  return svg;
}

function svgExtLink() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '10'); svg.setAttribute('height', '10');
  svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '2.5');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6');
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  poly.setAttribute('points', '15,3 21,3 21,9');
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', '10'); line.setAttribute('y1', '14'); line.setAttribute('x2', '21'); line.setAttribute('y2', '3');
  svg.appendChild(path); svg.appendChild(poly); svg.appendChild(line);
  return svg;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function buildLessonEl(lesson, modId) {
  const ls = getLessonState(lesson.id);
  const isSales = CURRICULUM.find(m => m.id === modId).tag === 'sales';

  const row = document.createElement('div');
  row.className = 'lesson-row';
  row.addEventListener('click', () => toggleLesson(lesson.id, modId));

  // Checkbox
  const box = document.createElement('div');
  box.className = 'check-box' + (ls.complete ? ' checked' : '');
  box.id = 'check-' + lesson.id;
  box.appendChild(svgCheck());
  row.appendChild(box);

  // Right side
  const right = document.createElement('div');
  right.className = 'flex-1 min-w-0';

  // Title row
  const titleRow = document.createElement('div');
  titleRow.className = 'flex items-start justify-between gap-2';

  const titleEl = document.createElement('p');
  titleEl.className = 'lesson-title text-sm font-medium leading-snug' + (ls.complete ? ' done' : '');
  titleEl.id = 'title-' + lesson.id;
  titleEl.style.color = ls.complete ? '#555' : '#ddd';
  titleEl.textContent = lesson.title; // textContent — safe for user-data-free lesson titles

  const metaWrap = document.createElement('div');
  metaWrap.className = 'flex items-center gap-2 flex-shrink-0';

  const timeEl = document.createElement('span');
  timeEl.style.cssText = 'color:#555;font-size:0.68rem;white-space:nowrap';
  timeEl.textContent = lesson.time;

  const expandBtn = document.createElement('button');
  expandBtn.className = 'expand-btn';
  expandBtn.id = 'expand-' + lesson.id;
  expandBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLessonBody(lesson.id); });
  expandBtn.appendChild(svgChevron('12'));

  metaWrap.appendChild(timeEl);
  metaWrap.appendChild(expandBtn);
  titleRow.appendChild(titleEl);
  titleRow.appendChild(metaWrap);
  right.appendChild(titleRow);

  // Expandable body
  const body = document.createElement('div');
  body.className = 'lesson-body';
  body.id = 'body-' + lesson.id;

  const resList = document.createElement('div');
  resList.className = 'flex flex-wrap gap-1 mt-2';
  lesson.resources.forEach(r => {
    const a = document.createElement('a');
    a.className = 'res-link';
    a.href = r.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.addEventListener('click', (e) => e.stopPropagation());
    a.appendChild(svgExtLink());
    a.appendChild(document.createTextNode(r.label)); // textContent via createTextNode
    resList.appendChild(a);
  });
  body.appendChild(resList);

  const ta = document.createElement('textarea');
  ta.className = 'notes-area';
  ta.placeholder = 'Notes…';
  ta.value = ls.notes || ''; // .value = (DOM property, not innerHTML) — safe
  ta.addEventListener('input', (e) => { e.stopPropagation(); saveNotes(lesson.id, ta.value); });
  ta.addEventListener('click', (e) => e.stopPropagation());
  body.appendChild(ta);

  right.appendChild(body);
  row.appendChild(right);
  return row;
}

function buildModuleCard(mod) {
  const isSales = mod.tag === 'sales';
  const done = moduleCompleted(mod);
  const pct = Math.round((done / mod.lessons.length) * 100);

  const card = document.createElement('div');
  card.className = 'module-card' + (pct === 100 ? ' complete' : '');
  card.id = 'mod-card-' + mod.id;

  // ── Card header ──
  const header = document.createElement('div');
  header.className = 'p-5 cursor-pointer select-none';
  header.style.position = 'relative';
  header.addEventListener('click', () => toggleModule(mod.id));

  // Ghost number badge
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = mod.id;
  header.appendChild(badge);

  // Pill + hours row
  const pillRow = document.createElement('div');
  pillRow.className = 'flex items-center gap-2 mb-1';
  const pill = document.createElement('span');
  pill.className = 'pill' + (isSales ? ' sales' : '');
  pill.textContent = isSales ? '🎯 Sales' : '⚙️ Core';
  const hoursEl = document.createElement('span');
  hoursEl.style.cssText = 'color:#555;font-size:0.7rem';
  hoursEl.textContent = mod.hours + ' hrs';
  pillRow.appendChild(pill); pillRow.appendChild(hoursEl);

  // Title
  const titleEl = document.createElement('h3');
  titleEl.className = 'text-base font-bold text-white';
  titleEl.textContent = mod.title;

  // Desc
  const descEl = document.createElement('p');
  descEl.style.cssText = 'color:#888;font-size:0.78rem;margin-top:2px';
  descEl.textContent = mod.desc;

  // Expand arrow
  const arrow = document.createElement('button');
  arrow.className = 'expand-btn mt-1';
  arrow.id = 'mod-arrow-' + mod.id;
  arrow.style.cssText = 'position:absolute;top:20px;right:20px';
  arrow.appendChild(svgChevron('14'));

  const textCol = document.createElement('div');
  textCol.appendChild(pillRow); textCol.appendChild(titleEl); textCol.appendChild(descEl);

  const topRow = document.createElement('div');
  topRow.className = 'flex items-start justify-between gap-3 mb-3';
  topRow.appendChild(textCol); topRow.appendChild(arrow);
  header.appendChild(topRow);

  // Progress bar
  const barWrap = document.createElement('div');
  barWrap.className = 'flex items-center gap-2';
  const track = document.createElement('div');
  track.className = 'pbar-track flex-1';
  const fill = document.createElement('div');
  fill.className = 'pbar-fill' + (isSales ? ' orange' : '');
  fill.id = 'mod-bar-' + mod.id;
  fill.style.width = pct + '%';
  track.appendChild(fill);
  const pctLabel = document.createElement('span');
  pctLabel.id = 'mod-pct-' + mod.id;
  pctLabel.style.cssText = 'color:#666;font-size:0.7rem;width:28px;text-align:right';
  pctLabel.textContent = pct + '%';
  barWrap.appendChild(track); barWrap.appendChild(pctLabel);
  header.appendChild(barWrap);

  card.appendChild(header);

  // ── Lessons container ──
  const lessonsWrap = document.createElement('div');
  lessonsWrap.id = 'lessons-' + mod.id;
  lessonsWrap.style.cssText = 'display:none;border-top:1px solid #1f1f1f';
  mod.lessons.forEach(lesson => lessonsWrap.appendChild(buildLessonEl(lesson, mod.id)));
  card.appendChild(lessonsWrap);

  return card;
}

function renderAll() {
  const grid = document.getElementById('module-grid');
  grid.textContent = ''; // clears safely without innerHTML
  CURRICULUM.forEach(mod => grid.appendChild(buildModuleCard(mod)));
  updateOverallProgress();
}

renderAll();
</script>
</body>
</html>
